version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: keyboard_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: keyboard_db
      MYSQL_USER: keyboard_user
      MYSQL_PASSWORD: keyboard1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: keyboard_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
